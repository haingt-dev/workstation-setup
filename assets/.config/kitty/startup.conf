os_window_state maximized

layout splits

# 1. Vault pane (top-left) — claude session in Idea_Vault
launch --title "vault" --cwd ~/Projects/Idea_Vault zsh -c 'source ~/.zshrc; claude --continue; exec zsh'

# 2. Shell (right, full height) — main
launch --title "shell" --location=vsplit --cwd ~/Projects

# 3. Digital-identity pane (hsplit vault via remote control) + focus shell
launch --type=background --allow-remote-control sh -c 'sleep 0.5; kitty @ launch --match title:vault --location=hsplit --title "digital-identity" --cwd ~/Projects/digital-identity zsh -c "source ~/.zshrc; claude --continue; exec zsh"; sleep 0.2; kitty @ focus-window --match title:shell 2>/dev/null'
