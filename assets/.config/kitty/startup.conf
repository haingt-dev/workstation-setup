os_window_state maximized

layout splits

# 1. Dashboard (top-left, starts full screen)
launch --title "dashboard" sh -c 'fastfetch -c ~/.config/fastfetch/kitty.jsonc; exec btop'

# 2. Shell (right, full height)
launch --title "shell" --location=vsplit --cwd=last_reported

# 3. Shell2 (hsplit dashboard via remote control) + focus shell
launch --type=background --allow-remote-control sh -c 'sleep 0.5; kitty @ launch --match title:dashboard --location=hsplit --title shell2 --cwd ~; sleep 0.2; kitty @ focus-window --match title:shell 2>/dev/null'
